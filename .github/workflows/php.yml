name: PHP Composer

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Validate composer.json and composer.lock
      run: composer validate --no-check-publish

    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-

    - name: Install root dependencies
      run: composer install --prefer-dist --no-progress

    - name: Install php-jobspy dependencies
      run: cd php-jobspy && composer install --prefer-dist --no-progress

    - name: Run php-jobspy PHPUnit Tests
      run: cd php-jobspy && ./vendor/bin/phpunit tests/
